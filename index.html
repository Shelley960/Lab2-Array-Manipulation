<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart</title>
    <script defer src="index.js"></script>
  </head>
  <body>
    <h1>Shopping Cart</h1>
    <input id="itemInput" type="text" placeholder="Enter an item" />
    <button id="addItemButton">Add Item</button>
    <button id="removeItemButton">Remove Last Item</button>
    <ul id="shoppingList"></ul>

    <input id="searchItem" type="text" placeholder="Search an item" />
    <button id="searchItemButton">Search</button>
    <ul id="search"></ul>
  </body>
</html>
